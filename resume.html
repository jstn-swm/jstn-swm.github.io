<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="This page contains the resume with dynamic layout"
    />
    <link rel="stylesheet" href="./css/style.css" />
    <link rel="stylesheet" href="./css/styleResume.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.0/css/all.css"
    />
    <title>Resume</title>
  </head>
  <body>
    <!-- Navigation at the top -->
    <nav class="main-nav top-nav"></nav>

    <!-- Header/Banner -->

    <main>
      <p>Resume Available Upon Request</p>
      <hr/>

      <!-- Added Skills & Technologies section -->

            <h3>Programming Languages</h3>
            <div class="skill-list">
              <span class="skill">JavaScript</span>
              <span class="skill">Python</span>
              <span class="skill">Java</span>
              <span class="skill">C++</span>
              <span class="skill">HTML/CSS</span>
            </div>
          </div>

          <div class="skill-category">
            <h3>Frameworks & Libraries</h3>
            <div class="skill-list">
              <span class="skill">React</span>
              <span class="skill">Node.js</span>
              <span class="skill">Express</span>
              <span class="skill">Bootstrap</span>
              <span class="skill">jQuery</span>
            </div>
          </div>

          <div class="skill-category">
            <h3>Tools & Platforms</h3>
            <div class="skill-list">
              <span class="skill">Git</span>
              <span class="skill">VS Code</span>
              <span class="skill">MongoDB</span>
              <span class="skill">Firebase</span>
              <span class="skill">AWS</span>

          </div>
        </div>
      </section>
    </main>
    <footer>
      <hr />
      <p>&copy;<i>justin.won1214+work@gmail.com</i></p>
    </footer>
    <script src="./js/common.js" defer></script>
