<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contacts</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.0/css/all.css"/>
    <link rel="stylesheet" href="./css/style.css" />
  <style>
    /* ─── Reset & Page Layout ───────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg-color, #1a1a1a);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      font-family: 'JetBrains Mono', monospace;
      color: var(--text-color, whitesmoke);
      transition: background 0.3s ease, color 0.3s ease;
    }

    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
    }

    /* ─── Card Design ───────────────────────────────────────── */
    .card {
      width: 420px;
      height: 220px;
      background: var(--card-bg, #141414);
      border-radius: 20px;
      padding: 24px 28px;
      display: flex;
      flex-direction: column;
      border: 1px solid var(--divider-color, #2a2a2a);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
      transition: background 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
    }
    .card:hover {
        transform: scale(105%)
    }

    /* Header Row (Traffic Lights) */
    .header-row {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 12px;
    }

    .traffic-lights {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* Base window dot styling */
    .light {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    position: relative; /* Crucial for absolute centering of the symbols */
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    }
    .light.red    { background: #ff5f56; }
    .light.yellow { background: #ffbd2e; }
    .light.green  { background: #27c93f; }

    /* Global hover state for pseudo-elements inside the dots */
    .light:hover::after {
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px;
    font-weight: 700;
    color: rgba(0, 0, 0, 0.6); /* Subtle dark contrast inside the colored dots */
    position: absolute;
    line-height: 1;
    }

    /* Specific symbols for each Mac-style control button */
    .light.red:hover::after {
    content: "×"; /* Close window symbol */
    }

    .light.yellow:hover::after {
    content: "-"; /* Minimize window symbol */
    top: 0%;    /* Slight manual optical alignment adjustments */
    }

    .light.green:hover::after {
    content: "+"; /* Maximize window symbol */
    }

    .profession {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      color: var(--card-text, #ffffff);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      transition: color 0.3s ease;
    }

    /* Horizontal Divider */
    .divider {
      width: 100%;
      height: 1px;
      background: var(--divider-color, #444444);
      margin-bottom: 22px;
      transition: background 0.3s ease;
    }

    /* Data Field Rows */
    .info-rows {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .info-row {
      font-size: 11px;
      color: var(--card-text, #ffffff);
      font-weight: 400;
      letter-spacing: -0.01em;
      white-space: nowrap;
      transition: color 0.3s ease;
    }

    /* Swapped syntax tags to pull theme's golden variable color directly */
    .info-row .tag { 
      color: var(--accent-color, darkgoldenrod); 
      transition: color 0.3s ease;
      background: none;
      border: none;
      padding: 0;
    }
    
    .info-row .val { color: var(--card-text, #ffffff);}
    
    .info-row a { 
      color: var(--card-text, #ffffff); 
      text-decoration: none; 
      transition: color 0.3s ease;
    }
    
    .info-row a:hover { 
      color: var(--highlight, green); 
      text-decoration: underline; 
    }

    /* Global Footer Layout Anchor */
    .footer {
      width: 100%;
      margin-top: auto;
    }
  </style>
</head>
<body>
    <nav class="main-nav top-nav"></nav>
    <header></header>

    <main class="main-content">
      <div class="card">
        
        <div class="header-row">
          <div class="traffic-lights">
            <div class="light red"></div>
            <div class="light yellow"></div>
            <div class="light green"></div>
          </div>
          <span class="profession">Justin Wang | Front-end + Back-end Dev</span>
        </div>

        <div class="divider"></div>

        <div class="info-rows">
          <div class="info-row">
            <span class="tag">&lt;Location&gt;</span>
            <span class="val">Vancouver, BC, Canada</span>
            <span class="tag">&lt;/Location&gt;</span>
          </div>
          <div class="info-row">
            <span class="tag">&lt;Email&gt;</span>
            <span class="val"><a href="mailto:justin.won1214+work@gmail.com">justin.won1214+work@gmail.com</a></span>
            <span class="tag">&lt;/Email&gt;</span>
          </div>
          <div class="info-row">
            <span class="tag">&lt;GitHub&gt;</span>
            <span class="val"><a href="https://github.com/jstn-swm" target="_blank">github.com/jstn-swm</a></span>
            <span class="tag">&lt;/GitHub&gt;</span>
          </div>
        </div>

      </div>
    </main>

    <footer class="footer"></footer>

    <script src="./js/common.js" defer></script>
</body>
</html>
